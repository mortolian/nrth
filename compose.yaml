x-laravel-env: &laravel-env
  APP_NAME: "${APP_NAME}"
  APP_ENV: "${APP_ENV}"
  APP_DEBUG: "${APP_DEBUG}"
  APP_KEY: "${APP_KEY}"
  APP_URL: "${APP_URL}"
  APP_FORCE_HTTPS: "${APP_FORCE_HTTPS:-true}"
  APP_ALLOW_HTTP: "${APP_ALLOW_HTTP:-false}"
  TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
  APP_LOCALE: "${APP_LOCALE}"
  APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE}"
  APP_FAKER_LOCALE: "${APP_FAKER_LOCALE}"
  LOG_CHANNEL: "${LOG_CHANNEL}"
  LOG_STACK: "${LOG_STACK}"
  LOG_DEPRECATIONS_CHANNEL: "${LOG_DEPRECATIONS_CHANNEL}"
  LOG_LEVEL: "${LOG_LEVEL}"
  DB_CONNECTION: "${DB_CONNECTION}"
  DB_HOST: "${DB_HOST}"
  DB_PORT: "${DB_PORT}"
  DB_DATABASE: "${DB_DATABASE}"
  DB_USERNAME: "${DB_USERNAME}"
  DB_PASSWORD: "${DB_PASSWORD}"
  SESSION_DRIVER: "${SESSION_DRIVER}"
  SESSION_LIFETIME: "${SESSION_LIFETIME}"
  SESSION_ENCRYPT: "${SESSION_ENCRYPT}"
  SESSION_PATH: "${SESSION_PATH}"
  SESSION_DOMAIN: "${SESSION_DOMAIN}"
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-}"
  BROADCAST_CONNECTION: "${BROADCAST_CONNECTION}"
  FILESYSTEM_DISK: "${FILESYSTEM_DISK}"
  QUEUE_CONNECTION: "${QUEUE_CONNECTION}"
  CACHE_STORE: "${CACHE_STORE}"
  REDIS_CLIENT: "${REDIS_CLIENT}"
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_PORT: "${REDIS_PORT}"
  MAIL_MAILER: "${MAIL_MAILER}"
  MAIL_SCHEME: "${MAIL_SCHEME}"
  MAIL_HOST: "${MAIL_HOST}"
  MAIL_PORT: "${MAIL_PORT}"
  MAIL_USERNAME: "${MAIL_USERNAME}"
  MAIL_PASSWORD: "${MAIL_PASSWORD}"
  MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
  MAIL_FROM_NAME: "${MAIL_FROM_NAME}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
  AWS_BUCKET: "${AWS_BUCKET}"
  AWS_ENDPOINT: "${AWS_ENDPOINT}"
  AWS_URL: "${AWS_URL}"
  AWS_USE_PATH_STYLE_ENDPOINT: "${AWS_USE_PATH_STYLE_ENDPOINT}"
  VITE_APP_NAME: "${VITE_APP_NAME}"
  VITE_DEV_SERVER_HOST: "${VITE_DEV_SERVER_HOST:-0.0.0.0}"
  VITE_DEV_SERVER_PORT: "${VITE_DEV_SERVER_PORT:-5173}"
  VITE_DEV_SERVER_HMR_HOST: "${VITE_DEV_SERVER_HMR_HOST:-localhost}"
  VITE_DEV_SERVER_HMR_PORT: "${VITE_DEV_SERVER_HMR_PORT:-5173}"
  VITE_DEV_SERVER_USE_POLLING: "${VITE_DEV_SERVER_USE_POLLING:-false}"

# Service names (postgres, redis, minio, mailpit) only resolve inside the Compose network.
# `.env` can use 127.0.0.1 + forwarded ports for `php artisan` on the host; app/worker/scheduler
# override those keys below so containers always use in-network hosts.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE}"
    volumes:
      - mysql_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio_data:/data
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      AWS_BUCKET: "${AWS_BUCKET}"
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
          sleep 2
        done
        mc mb local/$$AWS_BUCKET --ignore-existing
    restart: 'no'

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VITE_APP_NAME: "${VITE_APP_NAME}"
        APP_TITLE: "${APP_NAME}"
    image: nrth:local
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${VITE_PORT:-5173}:5173"
    environment:
      <<: *laravel-env
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      AWS_ENDPOINT: 'http://minio:9000'
      DOCKER_ROLE: app
      LARAVEL_SAIL: '1'
      # Octane's file-watcher.cjs runs under vendor/laravel/octane/bin; NODE_PATH guarantees
      # resolution of app-level deps (chokidar) when the named node_modules volume is in use.
      NODE_PATH: /var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    volumes:
      # Host source (hot reload for PHP/Vue) + Linux vendor/node_modules in named volumes.
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - storage_data:/var/www/html/storage
    # --watch --poll: Octane reloads workers when PHP changes; polling works with Docker Desktop file sharing.
    command: ['php', 'artisan', 'octane:start', '--server=swoole', '--host=0.0.0.0', '--port=8000', '--watch', '--poll']
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:8000/up']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  worker:
    image: nrth:local
    environment:
      <<: *laravel-env
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      AWS_ENDPOINT: 'http://minio:9000'
      DOCKER_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      app:
        condition: service_started
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - storage_data:/var/www/html/storage
    command: ['/usr/bin/supervisord', '-n', '-c', '/etc/supervisor/supervisord.conf']
    healthcheck:
      test: ['CMD-SHELL', 'supervisorctl -c /etc/supervisor/supervisord.conf status horizon | grep -q RUNNING']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  scheduler:
    image: nrth:local
    environment:
      <<: *laravel-env
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      AWS_ENDPOINT: 'http://minio:9000'
      DOCKER_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      app:
        condition: service_started
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - storage_data:/var/www/html/storage
    command: ['php', 'artisan', 'schedule:work']
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "artisan schedule:work" >/dev/null']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  # Optional TLS reverse proxy (enable with COMPOSE_PROFILES=proxy in .env).
  # Terminates HTTPS on 443 and forwards plain HTTP to Octane on app:8000.
  caddy:
    image: caddy:2-alpine
    profiles:
      - proxy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      CADDY_SITE: "${CADDY_SITE:-localhost}"
      # internal = self-signed (LAN IPs); off = automatic Let's Encrypt for public domains
      CADDY_TLS: "${CADDY_TLS:-internal}"
    volumes:
      - ./docker/caddy/entrypoint.sh:/entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'caddy', 'validate', '--config', '/etc/caddy/Caddyfile', '--adapter', 'caddyfile']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data:
  redis_data:
  minio_data:
  storage_data:
  vendor_data:
  node_modules_data:
  caddy_data:
  caddy_config:
