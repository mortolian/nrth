# Deploys to a self-hosted runner on your Docker server when master changes.
#
# Setup: install a GitHub Actions self-hosted runner on the server and label it
# `nrth-server`. See docs/PERSONAL_SERVER.md.
#
# If the repo is cloned somewhere other than /opt/nrth, change the script path below.

name: Deploy personal server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, nrth-server]
    steps:
      - name: Deploy latest master
        run: /opt/nrth/scripts/deploy.sh dev
