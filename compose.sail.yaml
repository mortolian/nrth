# Laravel Sail — local development stack aligned with compose.yaml (Postgres, Redis 7,
# MinIO, Mailpit). Use with:
#   SAIL_FILES=compose.sail.yaml ./vendor/bin/sail up -d
# or: composer sail -- up -d
#
# MinIO API :9000 (same host port as production stack — do not run both compose files
# with MinIO on 9000 at once). Console :9001 (matches production).

services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.4'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.4/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_healthy
            createbuckets:
                condition: service_completed_successfully
            mailpit:
                condition: service_started

    pgsql:
        image: 'postgres:16-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-spennies}'
            POSTGRES_DB: '${DB_DATABASE:-spennies}'
            POSTGRES_USER: '${DB_USERNAME:-spennies}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-spennies}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"']
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    redis:
        image: 'redis:7-alpine'
        command: redis-server --appendonly yes
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

    minio:
        image: 'minio/minio:latest'
        ports:
            - '${FORWARD_MINIO_PORT:-9000}:9000'
            - '${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001'
        environment:
            MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minio}'
            MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-miniosecretchange}'
        volumes:
            - 'sail-minio:/data'
        networks:
            - sail
        command: 'server /data --console-address ":9001"'
        healthcheck:
            test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live']
            interval: 15s
            timeout: 5s
            retries: 12
            start_period: 30s

    createbuckets:
        image: 'minio/mc:latest'
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: ['/bin/sh', '-c']
        command:
            - |
                until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
                  sleep 2
                done
                mc mb local/$$AWS_BUCKET --ignore-existing
        environment:
            MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minio}'
            MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-miniosecretchange}'
            AWS_BUCKET: '${AWS_BUCKET:-spennies}'
        networks:
            - sail
        restart: 'no'

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-minio:
        driver: local
